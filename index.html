        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = (error) => reject(error);
        });
    };
    
    // Helper: Compress Base64 image

        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > height) {
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width = (width * maxHeight) / height;
                        height = maxHeight;
                    }
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = base64;
        });
    };

    // Enhanced CommunityPanel Component with image uploads, edit/delete, voice notes, and online users
    const CommunityPanel = ({ currentUser, currentUserData, db }) => {

        const [imagePreview, setImagePreview] = useState("");
        const [editingPostId, setEditingPostId] = useState(null);
        const [editingText, setEditingText] = useState("");
        const [onlineUsers, setOnlineUsers] = useState([]);
        const [recordingPostId, setRecordingPostId] = useState(null);
        const [mediaRecorder, setMediaRecorder] = useState(null);
        const [audioChunks, setAudioChunks] = useState([]);
        
        const loadForum = async () => {
            const snapshot = await db.ref('forum/posts').once('value');
            const posts = [];
            snapshot.forEach(child => posts.push({ id: child.key, ...child.val() }));
            posts.reverse();
            const postsWithComments = await Promise.all(posts.map(async (post) => {
                const commentsSnap = await db.ref(`forum/comments/${post.id}`).once('value');
                const comments = [];
                commentsSnap.forEach(c => comments.push({ id: c.key, ...c.val() }));
                return { ...post, comments };
            }));
            setForumPosts(postsWithComments);
        };
        
        // Track online users
        useEffect(() => {
            if (!currentUser) return;
            const userStatusRef = db.ref(`status/${currentUser.uid}`);
            const userRef = db.ref(`users/${currentUser.uid}`);
            const connectedRef = db.ref('.info/connected');
            
            connectedRef.on('value', (snap) => {
                if (snap.val() === true) {
                    userStatusRef.onDisconnect().set({ state: 'offline', lastSeen: Date.now() });
                    userStatusRef.set({ state: 'online', lastSeen: Date.now(), fullname: currentUserData.fullname, profilePic: currentUserData.profilePic });
                }
            });
            
            const statusRef = db.ref('status');
            statusRef.on('value', (snap) => {
                const users = [];
                snap.forEach(child => {
                    const data = child.val();
                    if (data.state === 'online') {
                        users.push({ uid: child.key, ...data });
                    }
                });
                setOnlineUsers(users);
            });
            
            return () => {
                userStatusRef.set({ state: 'offline', lastSeen: Date.now() });
                statusRef.off();
            };
        }, [currentUser, currentUserData]);
        
        useEffect(() => {
            loadForum();
        }, []);
        
        const handleImageUpload = (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                if (file.size > 2 * 1024 * 1024) {
                    alert("Image too large! Max 2MB");
                    return;
                }
                setNewPostImage(file);
                const reader = new FileReader();
                reader.onload = () => setImagePreview(reader.result);
                reader.readAsDataURL(file);
            }
        };
        
        const handlePostMessage = async () => {
            if (!newPostText.trim() && !newPostImage) return;
            let imageBase64 = "";
            if (newPostImage) {
                imageBase64 = await fileToBase64(newPostImage);
                imageBase64 = await compressBase64Image(imageBase64, 400, 400);
            }
            await db.ref('forum/posts').push({ 
                author: currentUserData.fullname, 
                authorPic: currentUserData.profilePic || "", 
                text: newPostText, 
                image: imageBase64,
                timestamp: Date.now(),
                authorId: currentUser.uid
            });
            setNewPostText("");
            setNewPostImage(null);
            setImagePreview("");
            loadForum();
        };
        
        const handleDeletePost = async (postId, authorId) => {
            if (authorId !== currentUser.uid) {
                alert("You can only delete your own posts");
                return;
            }
            if (confirm("Are you sure you want to delete this post?")) {
                await db.ref(`forum/posts/${postId}`).remove();
                await db.ref(`forum/comments/${postId}`).remove();
                loadForum();
            }
        };
        
        const handleEditPost = async (postId) => {
            if (!editingText.trim()) return;
            await db.ref(`forum/posts/${postId}`).update({ text: editingText });
            setEditingPostId(null);
            setEditingText("");
            loadForum();
        };
        
        const startEdit = (post) => {
            if (post.authorId !== currentUser.uid) {
                alert("You can only edit your own posts");
                return;
            }
            setEditingPostId(post.id);
            setEditingText(post.text);
        };
        
        const startVoiceRecording = async (postId) => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                recorder.ondataavailable = (e) => chunks.push(e.data);
                recorder.onstop = async () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                    const audioBase64 = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(audioBlob);
                    });
                    await db.ref(`forum/comments/${postId}`).push({ 
                        author: currentUserData.fullname, 
                        authorPic: currentUserData.profilePic || "", 
                        text: "🎤 Voice note", 
                        audio: audioBase64,
                        timestamp: Date.now() 
                    });
                    loadForum();
                    stream.getTracks().forEach(track => track.stop());
                    setRecordingPostId(null);
                };
                recorder.start();
                setMediaRecorder(recorder);
                setRecordingPostId(postId);
                setAudioChunks(chunks);
            } catch(err) {
                alert("Microphone access denied or not available");
            }
        };
        
        const stopVoiceRecording = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
        };
        
        const handleComment = async (postId, commentText, audioBase64 = null) => {
            if (!commentText.trim() && !audioBase64) return;
            await db.ref(`forum/comments/${postId}`).push({ 
                author: currentUserData.fullname, 
                authorPic: currentUserData.profilePic || "", 
                text: commentText || "🎤 Voice message",
                audio: audioBase64 || "",
                timestamp: Date.now() 
            });
            loadForum();
        };
        
        const [commentInputs, setCommentInputs] = useState({});
        
        return (
            <div>
                <div className="flex items-center justify-between gap-3 mb-4 flex-wrap">
                    <div className="flex items-center gap-3">
                        <i className="fas fa-comments text-3xl text-green-600"></i>
                        <h2 className="text-2xl font-bold">Community Forum</h2>

                    {/* Online Users List */}

                        <i className="fas fa-circle text-green-500 text-xs"></i>
                        <span className="text-sm font-semibold">{onlineUsers.length} Online</span>
                        <div className="flex -space-x-2 ml-1">
                            {onlineUsers.slice(0, 3).map((user, idx) => (
                                <div key={idx} className="w-6 h-6 rounded-full bg-blue-500 flex items-center justify-center text-white text-xs overflow-hidden border-2 border-white">
                                    {user.profilePic ? <img src={user.profilePic} className="w-full h-full object-cover"/> : <i className="fas fa-user text-[10px]"></i>}
                                </div>
                            ))}
                            {onlineUsers.length > 3 && <span className="text-xs text-gray-500 ml-1">+{onlineUsers.length-3}</span>}
                        </div>
                    </div>
                </div>
                
                {/* Create Post Section */}
                <div className="bg-white p-4 rounded-2xl shadow mb-4">
                    <textarea rows="2" className="w-full border rounded-xl p-3 text-sm" placeholder="Share a tip, ask a question..." value={newPostText} onChange={e=>setNewPostText(e.target.value)}></textarea>
                    {imagePreview && (
                        <div className="relative inline-block mt-2">
                            <img src={imagePreview} alt="Preview" className="w-20 h-20 rounded-lg object-cover"/>
                            <button onClick={() => { setNewPostImage(null); setImagePreview(""); }} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button>
                        </div>
                    )}
                    <div className="flex gap-2 mt-3 flex-wrap">
                        <label className="bg-gray-100 hover:bg-gray-200 px-3 py-2 rounded-lg text-sm cursor-pointer flex items-center gap-2">
                            <i className="fas fa-image text-blue-500"></i> Add Image
                            <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden"/>
                        </label>
                        <button onClick={handlePostMessage} className="bg-blue-700 text-white px-5 py-2 rounded-full text-sm"><i className="fas fa-paper-plane mr-1"></i>Post</button>
                    </div>
                </div>
                
                {/* Forum Posts */}
                <div className="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                    {forumPosts.map(post => (
                        <div key={post.id} className="bg-white rounded-xl shadow p-4">
                            <div className="flex gap-3">
                                <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center overflow-hidden flex-shrink-0">
                                    {post.authorPic ? <img src={post.authorPic} className="w-full h-full object-cover"/> : <i className="fas fa-user-circle text-2xl text-blue-600"></i>}
                                </div>
                                <div className="flex-1">
                                    <div className="flex items-center justify-between flex-wrap gap-2">
                                        <div>
                                            <span className="font-semibold text-sm">{post.author}</span>
                                            <span className="text-xs text-gray-400 ml-2">{new Date(post.timestamp).toLocaleString()}</span>
                                        </div>
                                        {post.authorId === currentUser?.uid && (
                                            <div className="flex gap-2">
                                                <button onClick={() => startEdit(post)} className="text-blue-500 hover:text-blue-700 text-xs"><i className="fas fa-edit"></i></button>
                                                <button onClick={() => handleDeletePost(post.id, post.authorId)} className="text-red-500 hover:text-red-700 text-xs"><i className="fas fa-trash"></i></button>
                                            </div>
                                        )}
                                    </div>
                                    {editingPostId === post.id ? (
                                        <div className="mt-2">
                                            <input type="text" value={editingText} onChange={e=>setEditingText(e.target.value)} className="w-full border rounded-lg p-2 text-sm"/>
                                            <div className="flex gap-2 mt-2">
                                                <button onClick={() => handleEditPost(post.id)} className="bg-green-500 text-white px-3 py-1 rounded text-xs">Save</button>
                                                <button onClick={() => setEditingPostId(null)} className="bg-gray-300 px-3 py-1 rounded text-xs">Cancel</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <p className="text-sm mt-1">{post.text}</p>
                                    )}
                                    {post.image && <img src={post.image} alt="Post" className="mt-2 rounded-lg max-h-48 object-cover"/>}
                                    
                                    {/* Comments Section */}
                                    <div className="ml-8 mt-3">
                                        <div className="flex gap-2 flex-wrap">
                                            <input className="flex-1 border rounded-full px-3 py-1 text-xs" placeholder="Write a comment..." value={commentInputs[post.id]||''} onChange={e=>setCommentInputs({...commentInputs,[post.id]:e.target.value})}/>
                                            <button onClick={()=>{handleComment(post.id, commentInputs[post.id]||''); setCommentInputs({...commentInputs,[post.id]:''});}} className="bg-gray-200 px-3 rounded-full text-xs">Reply</button>
                                            <button onClick={() => startVoiceRecording(post.id)} className={`px-3 rounded-full text-xs flex items-center gap-1 ${recordingPostId === post.id ? 'bg-red-500 text-white recording-pulse' : 'bg-gray-200'}`}>
                                                <i className="fas fa-microphone"></i> {recordingPostId === post.id ? 'Recording...' : 'Voice'}
                                            </button>
                                            {recordingPostId === post.id && <button onClick={stopVoiceRecording} className="bg-green-500 text-white px-3 rounded-full text-xs">Stop</button>}
                                        </div>
                                        {post.comments?.map(c => (
                                            <div key={c.id} className="bg-gray-50 rounded-lg p-2 mt-2 text-sm">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-5 h-5 rounded-full bg-blue-100 flex items-center justify-center overflow-hidden">
                                                        {c.authorPic ? <img src={c.authorPic} className="w-full h-full object-cover"/> : <i className="fas fa-user-circle text-blue-500 text-xs"></i>}
                                                    </div>
                                                    <span className="font-semibold text-xs">{c.author}</span>
                                                    <span className="text-xs text-gray-400">{new Date(c.timestamp).toLocaleString()}</span>

                                                    </div>

                                                    <p className="ml-6 text-xs">{c.text}</p>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                    backgroundImage: "linear-gradient(to bottom right, rgba(30,58,138,0.5), rgba(67,56,202,0.9)), url('/police.jpeg')"
                }}>
                <div className="max-w-3xl text-center text-white greeting-animate">
                    <div className="mb-2 flex justify-center"><img src="/logo.jpg" className="w-24 h-24 rounded-full" alt="NPF CBT Prep Logo"/></div>
                    <h1 className="text-4xl md:text-5xl font-bold mb-2">Welcome to NPF CBT Prep </h1>
                    <p className="text-xl md:text-2xl font-light mb-3">Your Ultimate Police Force Exam Companion</p>
                    <div className="w-24 h-1 bg-orange-500 mx-auto my-4 rounded-full"></div>
                    <p className="text-lg md:text-xl mb-8 px-2">Master the Nigerian Police Force recruitment test with past questions, tutorials, quizzes, and a thriving community.</p>
                    <div className="flex gap-5 justify-center flex-wrap">
                        <button onClick={() => onGetStarted("login")} className="bg-white text-blue-900 px-6 md:px-8 py-3 rounded-full font-bold shadow-lg hover:scale-105 transition flex items-center gap-2"><i className="fas fa-sign-in-alt"></i> Login</button>
                        <button onClick={() => onGetStarted("register")} className="bg-orange-500 text-white px-6 md:px-8 py-3 rounded-full font-bold shadow-lg hover:scale-105 transition flex items-center gap-2"><i className="fas fa-user-plus"></i> Create Account</button>
                    </div>
                    <p className="mt-8 text-sm opacity-80">✨ Join thousands of aspirants already preparing ✨</p>
                    <br/>
                    <span className="text-white/80 text-sm bg-black px-4 py-2 rounded-full">Power by codekingdev | NPF CBT Prep</span>
                </div>
            </div>
        );
    };
    
    // Login Component
    const Login = ({ setCurrentView }) => {
        const [email, setEmail] = useState(""); const [pwd, setPwd] = useState(""); const [showPassword, setShowPassword] = useState(false); const [loading, setLoading] = useState(false);
        const handleLogin = async () => { if (!email || !pwd) { alert("Please enter both email and password"); return; } setLoading(true); try { await auth.signInWithEmailAndPassword(email, pwd); } catch(e) { alert(e.message); } finally { setLoading(false); } };
        return (<div className="min-h-screen flex items-center justify-center p-4"><div className="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-md" ><div className="text-center mb-6"><i className="fas fa-shield-alt text-5xl text-blue-600 mb-3"></i><h2 className="text-2xl md:text-3xl font-bold text-gray-800">Welcome Back</h2><p className="text-gray-500 text-sm mt-2">Login to continue your NPF CBT preparation</p></div><div className="relative mb-4"><i className="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 border rounded-xl focus:ring-2 focus:ring-blue-500" type="email" placeholder="Email Address" value={email} onChange={e=>setEmail(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleLogin()}/></div><div className="relative mb-6"><i className="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 pr-12 border rounded-xl focus:ring-2 focus:ring-blue-500" type={showPassword?"text":"password"} placeholder="Password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleLogin()}/><i className={`fa-solid ${showPassword?"fa-eye-slash":"fa-eye"} absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400`} onClick={()=>setShowPassword(!showPassword)}></i></div><button onClick={handleLogin} disabled={loading} className="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 disabled:opacity-50">{loading?<><i className="fas fa-spinner fa-spin"></i><span>Logging in...</span></>:<><i className="fas fa-sign-in-alt"></i><span>Login</span></>}</button><div className="flex items-center my-6"><div className="flex-1 border-t border-gray-300"></div><span className="px-4 text-gray-500 text-sm">or</span><div className="flex-1 border-t border-gray-300"></div></div><p className="text-center text-gray-600">Don't have an account? <button onClick={()=>setCurrentView("register")} className="text-blue-600 font-semibold"><i className="fas fa-user-plus mr-1"></i>Sign up now</button></p><button onClick={()=>setCurrentView("landing")} className="mt-4 text-gray-500 underline flex items-center justify-center gap-1 w-full"><i className="fas fa-arrow-left"></i><span>Back to Home</span></button></div></div>);
    };
    
    // Register Component
    const Register = ({ setCurrentView }) => {
        const [fullname, setFullname] = useState(""); const [email, setEmail] = useState(""); const [pwd, setPwd] = useState(""); const [confirmPwd, setConfirmPwd] = useState(""); const [gender, setGender] = useState("Male"); const [showPassword, setShowPassword] = useState(false); const [showConfirmPassword, setShowConfirmPassword] = useState(false); const [loading, setLoading] = useState(false); const [agreeTerms, setAgreeTerms] = useState(false);
        const [profilePicBase64, setProfilePicBase64] = useState(""); const [profilePicPreview, setProfilePicPreview] = useState("");
        
        const handleProfilePicChange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) { alert("Image too large! Please select an image under 2MB"); return; }
                try { let base64 = await fileToBase64(file); base64 = await compressBase64Image(base64, 150, 150); setProfilePicBase64(base64); setProfilePicPreview(base64); } catch(err) { alert("Error processing image"); }
            }
        };
        
        const handleRegister = async () => {
            if (!fullname||!email||!pwd||!confirmPwd) { alert("Please fill in all fields"); return; }
            if (pwd !== confirmPwd) { alert("Passwords do not match!"); return; }
            if (pwd.length < 6) { alert("Password must be at least 6 characters long"); return; }
            if (!agreeTerms) { alert("Please agree to the terms and conditions"); return; }
            setLoading(true);
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pwd);
                await db.ref(`users/${cred.user.uid}`).set({ fullname, email, gender, profilePic: profilePicBase64 || "", createdAt: Date.now() });
            } catch(e) { alert(e.message); } finally { setLoading(false); }
        };
        
        return (<div className="min-h-screen flex items-center justify-center p-4"><div className="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto"><div className="text-center mb-6"><i className="fas fa-user-graduate text-5xl text-orange-600 mb-3"></i><h2 className="text-2xl md:text-3xl font-bold text-gray-800">Create Account</h2><p className="text-gray-500 text-sm">Join thousands preparing for NPF CBT exam</p></div>
        <div className="flex flex-col items-center mb-4"><div className="relative"><div className="w-24 h-24 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden border-4 border-blue-500 shadow-lg">{profilePicPreview ? (<img src={profilePicPreview} alt="Preview" className="w-full h-full object-cover"/>) : (<i className="fas fa-camera text-3xl text-gray-400"></i>)}</div><label htmlFor="profilePicInput" className="absolute bottom-0 right-0 bg-blue-600 text-white p-2 rounded-full cursor-pointer hover:bg-blue-700 transition"><i className="fas fa-upload text-xs"></i></label><input type="file" id="profilePicInput" accept="image/jpeg,image/png,image/jpg" onChange={handleProfilePicChange} className="hidden"/></div><p className="text-xs text-gray-500 mt-2">Upload profile picture (optional, max 2MB)</p></div>
        <div className="relative mb-4"><i className="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 border rounded-xl" placeholder="Full Name" value={fullname} onChange={e=>setFullname(e.target.value)}/></div>
        <div className="relative mb-4"><i className="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 border rounded-xl" type="email" placeholder="Email Address" value={email} onChange={e=>setEmail(e.target.value)}/></div>
        <div className="relative mb-4"><i className="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 pr-12 border rounded-xl" type={showPassword?"text":"password"} placeholder="Password (min. 6 characters)" value={pwd} onChange={e=>setPwd(e.target.value)}/><i className={`fa-solid ${showPassword?"fa-eye-slash":"fa-eye"} absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400`} onClick={()=>setShowPassword(!showPassword)}></i></div>
        <div className="relative mb-4"><i className="fas fa-check-circle absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 pr-12 border rounded-xl" type={showConfirmPassword?"text":"password"} placeholder="Confirm Password" value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)}/><i className={`fa-solid ${showConfirmPassword?"fa-eye-slash":"fa-eye"} absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400`} onClick={()=>setShowConfirmPassword(!showConfirmPassword)}></i></div>
        <div className="relative mb-4"><i className="fas fa-venus-mars absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10"></i><select className="w-full p-3 pl-10 border rounded-xl appearance-none bg-white" value={gender} onChange={e=>setGender(e.target.value)}><option>Male</option><option>Female</option><option>Other</option></select><i className="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i></div>
        <div className="flex items-center gap-2 mb-6"><input type="checkbox" id="terms" checked={agreeTerms} onChange={e=>setAgreeTerms(e.target.checked)} className="w-4 h-4"/><label htmlFor="terms" className="text-sm text-gray-600">I agree to the <a href="#" className="text-orange-600">Terms</a> and <a href="#" className="text-orange-600">Privacy</a></label></div>
        <button onClick={handleRegister} disabled={loading} className="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 disabled:opacity-50">{loading?<><i className="fas fa-spinner fa-spin"></i><span>Creating...</span></>:<><i className="fas fa-user-plus"></i><span>Create Account</span></>}</button>
        <div className="flex items-center my-6"><div className="flex-1 border-t border-gray-300"></div><span className="px-4 text-gray-500 text-sm">or</span><div className="flex-1 border-t border-gray-300"></div></div>
        <p className="text-center text-gray-600">Already have an account? <button onClick={()=>setCurrentView("login")} className="text-orange-600 font-semibold"><i className="fas fa-sign-in-alt mr-1"></i>Login here</button></p>
        <button onClick={()=>setCurrentView("landing")} className="mt-4 text-gray-500 underline flex items-center justify-center gap-1 w-full"><i className="fas fa-arrow-left"></i><span>Back to Home</span></button></div></div>);
    };
    
    // ==================== MAIN APP COMPONENT ====================
    const App = () => {
        const [user, setUser] = useState(null);
        const [userData, setUserData] = useState({ fullname: "", email: "", gender: "", profilePic: "" });
        const [currentView, setCurrentView] = useState("landing");
        const [activeTab, setActiveTab] = useState("profile");
        const [sidebarOpen, setSidebarOpen] = useState(false);
        const [selectedSubject, setSelectedSubject] = useState(null);
        const [quizAnswers, setQuizAnswers] = useState({});
        const [quizSubmitted, setQuizSubmitted] = useState(false);
        const [quizResultMsg, setQuizResultMsg] = useState("");
        const [selectedTutorialSubject, setSelectedTutorialSubject] = useState("eng");
        const [selectedTopic, setSelectedTopic] = useState(null);
        const [topScores, setTopScores] = useState([]);
        const [greetingSpoken, setGreetingSpoken] = useState(false);
        
        useEffect(() => {
            if (currentView === "dashboard" && userData.fullname && !greetingSpoken) {
                const firstName = userData.fullname.split(' ')[0];
                const timeGreeting = getTimeGreeting();
                const message = `${timeGreeting} ${firstName}! Welcome to NPF CBT Prep. You can take a quiz, study tutorials, or join the community forum. Good luck with your preparation!`;
                speakText(message);
                setGreetingSpoken(true);
            }
        }, [currentView, userData.fullname, greetingSpoken]);
        
        useEffect(() => {
            const handleResize = () => {
                if (window.innerWidth >= 1024) setSidebarOpen(false);
            };
            window.addEventListener('resize', handleResize);
            return () => window.removeEventListener('resize', handleResize);
        }, []);
        
        useEffect(() => {
            const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
                if (firebaseUser) {
                    setUser(firebaseUser);
                    const snap = await db.ref(`users/${firebaseUser.uid}`).once('value');
                    if (snap.exists()) {
                        const data = snap.val();
                        setUserData({ fullname: data.fullname || firebaseUser.email.split('@')[0], email: firebaseUser.email, gender: data.gender || "Not set", profilePic: data.profilePic || "" });
                    } else {
                        setUserData({ fullname: firebaseUser.email.split('@')[0], email: firebaseUser.email, gender: "Not set", profilePic: "" });
                    }
                    setCurrentView("dashboard");
                    setGreetingSpoken(false);
                    loadScoreboard();
                } else {
                    setUser(null);
                    setCurrentView("landing");
                    setUserData({ fullname: "", email: "", gender: "", profilePic: "" });
                    setGreetingSpoken(false);
                }
            });
            return () => unsubscribe();
        }, []);
        
        const loadScoreboard = async () => {
            const snapshot = await db.ref('scores').once('value');
            const allScores = [];
            snapshot.forEach(userScoreSnap => {
                userScoreSnap.forEach(scoreItem => {
                    const val = scoreItem.val();
                    allScores.push({ fullname: val.fullname, score: val.score, subject: val.subject, timestamp: val.timestamp });
                });
            });
            const sorted = allScores.sort((a,b) => b.score - a.score).slice(0, 20);
            setTopScores(sorted);
        };
        
        const handleQuizSubmit = async () => {
            if (!selectedSubject) return;
            const questions = QUIZ_BANK[selectedSubject];
            let correct = 0;
            questions.forEach((q, idx) => {
                if (quizAnswers[idx] !== undefined && parseInt(quizAnswers[idx]) === q.correct) correct++;
            });
            const percent = Math.round((correct / questions.length) * 100);
            setQuizResultMsg(`You scored ${correct}/${questions.length} (${percent}%)`);
            setQuizSubmitted(true);
            if (user) await saveScoreToDB(user.uid, userData.fullname, selectedSubject, percent);
            await loadScoreboard();
            speakText(`You scored ${correct} out of ${questions.length}, which is ${percent} percent. Keep practicing!`);
        };
        
        const resetQuiz = () => { setQuizAnswers({}); setQuizSubmitted(false); setQuizResultMsg(""); };
        const toggleSidebar = () => setSidebarOpen(prev => !prev);
        
        const getTimeGreeting = () => {
            const hour = new Date().getHours();
            if (hour < 12) return "Good morning";
            if (hour < 17) return "Good afternoon";
            return "Good evening";
        };
        
        const tabsList = [
            { id: "profile", label: "My Dashboard", icon: "fa-chart-line" },
            { id: "quiz", label: "CBT Quiz", icon: "fa-pen-alt" },
            { id: "tutorial", label: "Tutorials", icon: "fa-book" },
            { id: "community", label: "Community Forum", icon: "fa-comments" },
            { id: "scoreboard", label: "Scoreboard", icon: "fa-trophy" }
        ];
        
        const renderDashboard = () => (
            <div className="lg:flex min-h-screen bg-gray-50">
                <div className="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-md z-30 px-4 py-3 flex items-center justify-between">
                    <div className="flex items-center gap-2"><i className="fas fa-shield-alt text-blue-700 text-xl"></i><span className="font-bold text-gray-800">NPF CBT Prep</span></div>
                    <button onClick={toggleSidebar} className="p-2 rounded-lg bg-gray-100"><i className={`fas ${sidebarOpen ? 'fa-times' : 'fa-bars'} text-xl text-gray-700`}></i></button>
                </div>
                {sidebarOpen && <div className="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden" onClick={toggleSidebar}></div>}
                <div className={`fixed lg:static top-0 left-0 h-full w-72 bg-white shadow-2xl z-50 transform transition-transform duration-300 ease-in-out ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0`}>
                    <div className="p-5 pt-16 lg:pt-5 border-b flex items-center gap-3">
                        {userData.profilePic ? <img src={userData.profilePic} className="w-12 h-12 rounded-full object-cover border-2 border-blue-500"/> : <div className="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white"><i className="fas fa-user-shield text-xl"></i></div>}
                        <div className="flex-1 min-w-0"><p className="font-bold truncate">{userData.fullname}</p><p className="text-sm text-gray-500 truncate">{userData.email}</p></div>
                        <button onClick={toggleSidebar} className="lg:hidden text-gray-500"><i className="fas fa-times"></i></button>
                    </div>
                    <nav className="flex-1 p-4 space-y-2 overflow-y-auto h-[calc(100vh-120px)]">
                        {tabsList.map(tab => (<button key={tab.id} onClick={() => { setActiveTab(tab.id); setSelectedSubject(null); setQuizSubmitted(false); setQuizResultMsg(""); setSelectedTopic(null); if (window.innerWidth < 1024) setSidebarOpen(false); }} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition-all duration-200 ${activeTab === tab.id ? 'bg-gradient-to-r from-blue-800 to-blue-900 text-white shadow-md' : 'hover:bg-gray-100 text-gray-700'}`}><i className={`fas ${tab.icon} w-5`}></i><span className="font-medium">{tab.label}</span></button>))}
                        <button onClick={() => auth.signOut()} className="w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 text-red-600 hover:bg-red-50 mt-4"><i className="fas fa-sign-out-alt w-5"></i><span>Logout</span></button>
                    </nav>
                </div>
                <div className="lg:ml-12 transition-all w-100 duration-300 min-h-screen">
                    <div className="h-16 lg:hidden"></div>
                    <div className="p-4 md:p-6 lg:p-8">
                        <div className="max-w-7xl mx-auto">
                            {activeTab === "profile" && (<><div className="mb-6 bg-gradient-to-r from-blue-700 to-indigo-800 rounded-2xl shadow-xl p-5 text-white greeting-animate"><div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-3"><div><div className="flex items-center gap-2"><i className="fas fa-hand-peace text-3xl"></i><span className="text-sm uppercase tracking-wide opacity-80">{getTimeGreeting()}</span></div><h2 className="text-2xl md:text-3xl font-bold mt-1">Hello, {userData.fullname.split(' ')[0]}! 👋</h2><p className="text-blue-100 mt-1">Welcome to NPF CBT Prep — sharpen your skills and ace the exam.</p></div><button onClick={() => { setActiveTab("quiz"); setSelectedSubject(null); setQuizSubmitted(false); speakText(`Let's take a quiz ${userData.fullname.split(' ')[0]}! Choose a subject to begin.`); }} className="bg-orange-500 hover:bg-orange-600 transition-all px-5 py-2 rounded-full text-sm font-semibold shadow-lg flex items-center gap-2"><i className="fas fa-pen-alt"></i> Try Today's Quiz 🔥</button></div></div><ProfileCard userData={userData} setUserData={setUserData} user={user} fileToBase64={fileToBase64} compressBase64Image={compressBase64Image} /></>)}
                            {activeTab === "quiz" && <QuizPanel selectedSubject={selectedSubject} setSelectedSubject={setSelectedSubject} quizAnswers={quizAnswers} setQuizAnswers={setQuizAnswers} quizSubmitted={quizSubmitted} quizResultMsg={quizResultMsg} handleQuizSubmit={handleQuizSubmit} resetQuiz={resetQuiz} subjects={SUBJECTS} quizBank={QUIZ_BANK} userFirstName={userData.fullname.split(' ')[0]} />}
                            {activeTab === "tutorial" && <TutorialPanel selectedTutorialSubject={selectedTutorialSubject} setSelectedTutorialSubject={setSelectedTutorialSubject} selectedTopic={selectedTopic} setSelectedTopic={setSelectedTopic} subjects={SUBJECTS} tutorialContent={TUTORIAL_CONTENT} />}
                            {activeTab === "community" && <CommunityPanel currentUser={user} currentUserData={userData} db={db} />}
                            {activeTab === "scoreboard" && <ScoreboardPanel topScores={topScores} />}
                        </div>
                    </div>
                </div>
            </div>
        );
        
        if (currentView === "landing") return <Landing onGetStarted={setCurrentView} />;
        if (currentView === "login") return <Login setCurrentView={setCurrentView} />;
        if (currentView === "register") return <Register setCurrentView={setCurrentView} />;
        if (currentView === "dashboard" && user) return renderDashboard();
        return <div className="flex items-center justify-center h-screen">Loading...</div>;
    };
    
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
