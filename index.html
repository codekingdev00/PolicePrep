            return;
        }
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);

        utterance.pitch = 1.0;
        utterance.volume = 1;

        window.speechSynthesis.speak(utterance);
    };

        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = (error) => reject(error);
        });
    };
    
    // Helper: Compress Base64 image

        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;
                if (width > height) {
                    if (width > maxWidth) {
                        height = (height * maxWidth) / width;
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width = (width * maxHeight) / height;
                        height = maxHeight;
                    }
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = base64;
        });
    };

    async function saveScoreToDB(userId, fullname, subject, scorePercent) {

    // Helper: shuffle array (Fisher-Yates) for question randomization
    const shuffleArray = (array) => {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    };
    
    // Enhanced QuizPanel: question randomization + new "Quiz Answers" tab (showing correct answers)
    const QuizPanel = ({ selectedSubject, setSelectedSubject, quizAnswers, setQuizAnswers, quizSubmitted, quizResultMsg, handleQuizSubmit, resetQuiz, subjects, quizBank, userFirstName }) => {
        const [shuffledQuestions, setShuffledQuestions] = useState([]);
        
        useEffect(() => {
            if (selectedSubject && quizBank[selectedSubject]) {
                const freshShuffle = shuffleArray(quizBank[selectedSubject]);
                setShuffledQuestions(freshShuffle);
                setQuizAnswers({});
            } else {
                setShuffledQuestions([]);
            }
        }, [selectedSubject, quizBank]);
        
        const handleResetWithShuffle = () => {
            if (selectedSubject && quizBank[selectedSubject]) {
                const newShuffle = shuffleArray(quizBank[selectedSubject]);
                setShuffledQuestions(newShuffle);
            }
            resetQuiz();
        };
        
        const currentQuestions = shuffledQuestions;
        return (<div><div className="flex items-center gap-3 mb-4"><i className="fas fa-pen-alt text-3xl text-orange-600"></i><h2 className="text-2xl font-bold">CBT Quiz</h2></div>

        const [sidebarOpen, setSidebarOpen] = useState(false);
        const [selectedSubject, setSelectedSubject] = useState(null);
        const [quizAnswers, setQuizAnswers] = useState({});
        const [quizSubmitted, setQuizSubmitted] = useState(false);
        const [quizResultMsg, setQuizResultMsg] = useState("");
        const [selectedTutorialSubject, setSelectedTutorialSubject] = useState("eng");
        const [selectedTopic, setSelectedTopic] = useState(null);
        const [topScores, setTopScores] = useState([]);
        const [greetingSpoken, setGreetingSpoken] = useState(false);
        
        useEffect(() => {
            if (currentView === "dashboard" && userData.fullname && !greetingSpoken) {
                const firstName = userData.fullname.split(' ')[0];
                const hour = new Date().getHours();
                const timeGreeting = hour < 12 ? "Good morning" : (hour < 17 ? "Good afternoon" : "Good evening");
                speakText(`${timeGreeting} ${firstName}! Welcome to NPF CBT Prep. You can take a quiz, study tutorials, or join the community forum. Good luck!`);
                setGreetingSpoken(true);
            }
        }, [currentView, userData.fullname, greetingSpoken]);
        
        useEffect(() => {
            const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
                if (firebaseUser) {
                    setUser(firebaseUser);
                    const snap = await db.ref(`users/${firebaseUser.uid}`).once('value');
                    if (snap.exists()) { const data = snap.val(); setUserData({ fullname: data.fullname || firebaseUser.email.split('@')[0], email: firebaseUser.email, gender: data.gender || "Not set", profilePic: data.profilePic || "" }); }
                    else { setUserData({ fullname: firebaseUser.email.split('@')[0], email: firebaseUser.email, gender: "Not set", profilePic: "" }); }
                    setCurrentView("dashboard");
                    setGreetingSpoken(false);
                    loadScoreboard();
                } else { setUser(null); setCurrentView("landing"); setUserData({ fullname: "", email: "", gender: "", profilePic: "" }); setGreetingSpoken(false); }
            });
            return () => unsubscribe();
        }, []);
        
        const loadScoreboard = async () => {
            const snapshot = await db.ref('scores').once('value');
            const allScores = [];
            snapshot.forEach(userScoreSnap => { userScoreSnap.forEach(scoreItem => { const val = scoreItem.val(); allScores.push({ fullname: val.fullname, score: val.score, subject: val.subject, timestamp: val.timestamp }); }); });
            const sorted = allScores.sort((a,b) => b.score - a.score).slice(0, 20);
            setTopScores(sorted);
        };
        
        const handleQuizSubmit = async () => {
            if (!selectedSubject) return;
            const questions = QUIZ_BANK[selectedSubject];
            let correct = 0;
            questions.forEach((q, idx) => { if (quizAnswers[idx] !== undefined && parseInt(quizAnswers[idx]) === q.correct) correct++; });
            const percent = Math.round((correct / questions.length) * 100);
            setQuizResultMsg(`You scored ${correct}/${questions.length} (${percent}%)`);
            setQuizSubmitted(true);
            if (user) await saveScoreToDB(user.uid, userData.fullname, selectedSubject, percent);
            await loadScoreboard();
            speakText(`You scored ${correct} out of ${questions.length}, which is ${percent} percent. Keep practicing!`);
        };
        
        const resetQuiz = () => { setQuizAnswers({}); setQuizSubmitted(false); setQuizResultMsg(""); };
        const toggleSidebar = () => setSidebarOpen(prev => !prev);
        
        const tabsList = [
            { id: "profile", label: "My Dashboard", icon: "fa-chart-line" },
            { id: "quiz", label: "CBT Quiz", icon: "fa-pen-alt" },
            { id: "answers", label: "Quiz Answers", icon: "fa-check-double" },
            { id: "tutorial", label: "Tutorials", icon: "fa-book" },
            { id: "community", label: "Community Forum", icon: "fa-comments" },
            { id: "scoreboard", label: "Scoreboard", icon: "fa-trophy" }
        ];
        
        const renderDashboard = () => (
            <div className="lg:flex min-h-screen bg-gray-50">
                <div className="lg:hidden fixed top-0 left-0 right-0 bg-white shadow-md z-30 px-4 py-3 flex items-center justify-between"><div className="flex items-center gap-2"><i className="fas fa-shield-alt text-blue-700 text-xl"></i><span className="font-bold text-gray-800">NPF CBT Prep</span></div><button onClick={toggleSidebar} className="p-2 rounded-lg bg-gray-100"><i className={`fas ${sidebarOpen ? 'fa-times' : 'fa-bars'} text-xl text-gray-700`}></i></button></div>
                {sidebarOpen && <div className="fixed inset-0 bg-black bg-opacity-50 z-40 lg:hidden" onClick={toggleSidebar}></div>}
                <div className={`fixed lg:static top-0 left-0 h-full w-72 bg-white shadow-2xl z-50 transform transition-transform duration-300 ease-in-out ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0`}>
                    <div className="p-5 pt-16 lg:pt-5 border-b flex items-center gap-3">{userData.profilePic ? <img src={userData.profilePic} className="w-12 h-12 rounded-full object-cover border-2 border-blue-500"/> : <div className="w-12 h-12 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white"><i className="fas fa-user-shield text-xl"></i></div>}<div className="flex-1 min-w-0"><p className="font-bold truncate">{userData.fullname}</p><p className="text-sm text-gray-500 truncate">{userData.email}</p></div><button onClick={toggleSidebar} className="lg:hidden text-gray-500"><i className="fas fa-times"></i></button></div>
                    <nav className="flex-1 p-4 space-y-2 overflow-y-auto h-[calc(100vh-120px)]">
                        {tabsList.map(tab => (<button key={tab.id} onClick={() => { setActiveTab(tab.id); setSelectedSubject(null); setQuizSubmitted(false); setQuizResultMsg(""); setSelectedTopic(null); if (window.innerWidth < 1024) setSidebarOpen(false); }} className={`w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition-all duration-200 ${activeTab === tab.id ? 'bg-gradient-to-r from-blue-800 to-blue-900 text-white shadow-md' : 'hover:bg-gray-100 text-gray-700'}`}><i className={`fas ${tab.icon} w-5`}></i><span className="font-medium">{tab.label}</span></button>))}
                        <button onClick={() => auth.signOut()} className="w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 text-red-600 hover:bg-red-50 mt-4"><i className="fas fa-sign-out-alt w-5"></i><span>Logout</span></button>
                    </nav>
                </div>
                <div className="lg:ml-12 transition-all w-100 duration-300 min-h-screen"><div className="h-16 lg:hidden"></div><div className="p-4 md:p-6 lg:p-8"><div className="max-w-7xl mx-auto">
                    {activeTab === "profile" && (<><div className="mb-6 bg-gradient-to-r from-blue-700 to-indigo-800 rounded-2xl shadow-xl p-5 text-white greeting-animate"><div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-3"><div><div className="flex items-center gap-2"><i className="fas fa-hand-peace text-3xl"></i><span className="text-sm uppercase tracking-wide opacity-80">{new Date().getHours()<12?"Good morning":(new Date().getHours()<17?"Good afternoon":"Good evening")}</span></div><h2 className="text-2xl md:text-3xl font-bold mt-1">Hello, {userData.fullname.split(' ')[0]}! 👋</h2><p className="text-blue-100 mt-1">Welcome to NPF CBT Prep — sharpen your skills and ace the exam.</p></div><button onClick={() => { setActiveTab("quiz"); setSelectedSubject(null); setQuizSubmitted(false); speakText(`Let's take a quiz ${userData.fullname.split(' ')[0]}! Choose a subject to begin.`); }} className="bg-orange-500 hover:bg-orange-600 transition-all px-5 py-2 rounded-full text-sm font-semibold shadow-lg flex items-center gap-2"><i className="fas fa-pen-alt"></i> Try Today's Quiz 🔥</button></div></div>
                    <ProfileCard userData={userData} setUserData={setUserData} user={user} fileToBase64={fileToBase64} compressBase64Image={compressBase64Image} /></>)}
                    {activeTab === "quiz" && <QuizPanel selectedSubject={selectedSubject} setSelectedSubject={setSelectedSubject} quizAnswers={quizAnswers} setQuizAnswers={setQuizAnswers} quizSubmitted={quizSubmitted} quizResultMsg={quizResultMsg} handleQuizSubmit={handleQuizSubmit} resetQuiz={resetQuiz} subjects={SUBJECTS} quizBank={QUIZ_BANK} userFirstName={userData.fullname.split(' ')[0]} />}
                    {activeTab === "answers" && <QuizAnswersPanel subjects={SUBJECTS} quizBank={QUIZ_BANK} />}
                    {activeTab === "tutorial" && <TutorialPanel selectedTutorialSubject={selectedTutorialSubject} setSelectedTutorialSubject={setSelectedTutorialSubject} selectedTopic={selectedTopic} setSelectedTopic={setSelectedTopic} subjects={SUBJECTS} tutorialContent={TUTORIAL_CONTENT} />}
                    {activeTab === "community" && <CommunityPanel currentUser={user} currentUserData={userData} db={db} />}
                    {activeTab === "scoreboard" && <ScoreboardPanel topScores={topScores} />}
                </div></div></div></div>
        );
        
        const ProfileCard = ({ userData, setUserData, user, fileToBase64, compressBase64Image }) => {
            const [uploading, setUploading] = useState(false);
            const handlePicUpload = async (e) => { const file = e.target.files[0]; if (file && user) { if (file.size > 2*1024*1024) { alert("Image too large"); return; } setUploading(true); try { let base64 = await fileToBase64(file); base64 = await compressBase64Image(base64, 150, 150); await db.ref(`users/${user.uid}`).update({ profilePic: base64 }); setUserData({ ...userData, profilePic: base64 }); alert("Profile picture updated!"); } catch(err) { alert("Upload failed"); } finally { setUploading(false); } } };
            return (<div className="bg-white rounded-2xl p-6 shadow-lg"><div className="flex flex-col md:flex-row items-center gap-4 pb-4 border-b"><div className="relative"><div className="w-24 h-24 rounded-full bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center text-white text-4xl overflow-hidden">{userData.profilePic ? (<img src={userData.profilePic} alt="Profile" className="w-full h-full object-cover"/>) : (<i className="fas fa-user-shield"></i>)}</div><label htmlFor="updateProfilePic" className="absolute bottom-0 right-0 bg-blue-600 text-white p-1 rounded-full cursor-pointer text-xs"><i className="fas fa-camera"></i></label><input type="file" id="updateProfilePic" accept="image/jpeg,image/png,image/jpg" onChange={handlePicUpload} className="hidden" disabled={uploading}/></div><div><h2 className="text-2xl font-bold">My Profile</h2><p className="text-gray-500 text-sm">{uploading ? "Uploading..." : "Click camera to change picture"}</p></div></div><div className="space-y-3 mt-4"><div className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl"><i className="fas fa-user-circle text-blue-600 text-xl w-6"></i><div><p className="text-xs text-gray-500">Full Name</p><p className="font-semibold">{userData.fullname}</p></div></div><div className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl"><i className="fas fa-envelope text-blue-600 text-xl w-6"></i><div><p className="text-xs text-gray-500">Email</p><p className="font-semibold">{userData.email}</p></div></div><div className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl"><i className="fas fa-venus-mars text-blue-600 text-xl w-6"></i><div><p className="text-xs text-gray-500">Gender</p><p className="font-semibold">{userData.gender}</p></div></div></div><div className="mt-6 p-4 bg-blue-50 rounded-xl"><i className="fas fa-chalkboard-teacher text-blue-600 mr-2"></i> Keep practicing to top the scoreboard!</div></div>);
        };
        
        const TutorialPanel = ({ selectedTutorialSubject, setSelectedTutorialSubject, selectedTopic, setSelectedTopic, subjects, tutorialContent }) => {
            const currentTopics = subjects.find(s=>s.id===selectedTutorialSubject)?.topics||[];
            return (<div><div className="flex items-center gap-3 mb-4"><i className="fas fa-book-open text-3xl text-blue-600"></i><h2 className="text-2xl font-bold">Tutorials</h2></div><div className="flex flex-wrap gap-2 mb-4">{subjects.map(s=><button key={s.id} onClick={()=>{setSelectedTutorialSubject(s.id); setSelectedTopic(null);}} className={`px-3 py-1 rounded-full text-sm flex items-center gap-1 ${selectedTutorialSubject===s.id?'bg-blue-800 text-white':'bg-gray-200'}`}><i className={`fas ${s.icon}`}></i>{s.name}</button>)}</div><div className="flex flex-col lg:flex-row gap-4"><div className="lg:w-1/3 bg-white p-4 rounded-xl shadow"><h3 className="font-bold mb-2"><i className="fas fa-list-ul text-blue-600 mr-2"></i>Topics</h3><div className="space-y-1 max-h-64 overflow-y-auto">{currentTopics.map(t=><button key={t} onClick={()=>setSelectedTopic(t)} className={`block w-full text-left p-2 rounded-lg text-sm ${selectedTopic===t?'bg-blue-100 text-blue-800':'hover:bg-gray-100'}`}>{t}</button>)}</div></div><div className="lg:w-2/3 bg-white p-5 rounded-xl shadow"><h3 className="text-lg font-bold mb-2">{selectedTopic||"Lesson Preview"}</h3><p className="text-gray-700 text-sm">{selectedTopic?tutorialContent[selectedTutorialSubject]?.[selectedTopic]:"Select a topic to view lesson"}</p></div></div></div>);
        };
        
        if (currentView === "landing") return <Landing onGetStarted={setCurrentView} />;
        if (currentView === "login") return <Login setCurrentView={setCurrentView} />;
        if (currentView === "register") return <Register setCurrentView={setCurrentView} />;
        if (currentView === "dashboard" && user) return renderDashboard();
        return <div className="flex items-center justify-center h-screen">Loading...</div>;
    };
    
    const Landing = ({ onGetStarted }) => {
        useEffect(() => { speakText("Welcome to NPF CBT Prep. Your ultimate Police Force exam companion. Get started by logging in or creating an account."); }, []);
        return (<div className="min-h-screen flex flex-col items-center justify-center p-4 bg-cover bg-center" style={{ backgroundImage: "linear-gradient(to bottom right, rgba(30,58,138,0.5), rgba(67,56,202,0.9)), url('/police.jpeg')" }}><div className="max-w-3xl text-center text-white greeting-animate"><div className="mb-2 flex justify-center"><img src="/logo.jpg" className="w-24 h-24 rounded-full" alt="NPF CBT Prep Logo"/></div><h1 className="text-4xl md:text-5xl font-bold mb-2">Welcome to NPF CBT Prep </h1><p className="text-xl md:text-2xl font-light mb-3">Your Ultimate Police Force Exam Companion</p><div className="w-24 h-1 bg-orange-500 mx-auto my-4 rounded-full"></div><p className="text-lg md:text-xl mb-8 px-2">Master the Nigerian Police Force recruitment test with past questions, tutorials, quizzes, and a thriving community.</p><div className="flex gap-5 justify-center flex-wrap"><button onClick={() => onGetStarted("login")} className="bg-white text-blue-900 px-6 md:px-8 py-3 rounded-full font-bold shadow-lg hover:scale-105 transition flex items-center gap-2"><i className="fas fa-sign-in-alt"></i> Login</button><button onClick={() => onGetStarted("register")} className="bg-orange-500 text-white px-6 md:px-8 py-3 rounded-full font-bold shadow-lg hover:scale-105 transition flex items-center gap-2"><i className="fas fa-user-plus"></i> Create Account</button></div><p className="mt-8 text-sm opacity-80">✨ Join thousands of aspirants already preparing ✨</p><br/><span className="text-white/80 text-sm bg-black px-4 py-2 rounded-full">Power by codekingdev | NPF CBT Prep</span></div></div>);
    };
    
    const Login = ({ setCurrentView }) => {
        const [email, setEmail] = useState(""); const [pwd, setPwd] = useState(""); const [showPassword, setShowPassword] = useState(false); const [loading, setLoading] = useState(false);
        const handleLogin = async () => { if (!email||!pwd) { alert("Please enter both email and password"); return; } setLoading(true); try { await auth.signInWithEmailAndPassword(email, pwd); } catch(e) { alert(e.message); } finally { setLoading(false); } };
        return (<div className="min-h-screen flex items-center justify-center p-4"><div className="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-md"><div className="text-center mb-6"><i className="fas fa-shield-alt text-5xl text-blue-600 mb-3"></i><h2 className="text-2xl md:text-3xl font-bold text-gray-800">Welcome Back</h2><p className="text-gray-500 text-sm mt-2">Login to continue your NPF CBT preparation</p></div><div className="relative mb-4"><i className="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 border rounded-xl focus:ring-2 focus:ring-blue-500" type="email" placeholder="Email Address" value={email} onChange={e=>setEmail(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleLogin()}/></div><div className="relative mb-6"><i className="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 pr-12 border rounded-xl focus:ring-2 focus:ring-blue-500" type={showPassword?"text":"password"} placeholder="Password" value={pwd} onChange={e=>setPwd(e.target.value)} onKeyPress={e=>e.key==='Enter'&&handleLogin()}/><i className={`fa-solid ${showPassword?"fa-eye-slash":"fa-eye"} absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400`} onClick={()=>setShowPassword(!showPassword)}></i></div><button onClick={handleLogin} disabled={loading} className="w-full bg-gradient-to-r from-blue-600 to-blue-700 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 disabled:opacity-50">{loading?<><i className="fas fa-spinner fa-spin"></i><span>Logging in...</span></>:<><i className="fas fa-sign-in-alt"></i><span>Login</span></>}</button><div className="flex items-center my-6"><div className="flex-1 border-t border-gray-300"></div><span className="px-4 text-gray-500 text-sm">or</span><div className="flex-1 border-t border-gray-300"></div></div><p className="text-center text-gray-600">Don't have an account? <button onClick={()=>setCurrentView("register")} className="text-blue-600 font-semibold"><i className="fas fa-user-plus mr-1"></i>Sign up now</button></p><button onClick={()=>setCurrentView("landing")} className="mt-4 text-gray-500 underline flex items-center justify-center gap-1 w-full"><i className="fas fa-arrow-left"></i><span>Back to Home</span></button></div></div>);
    };
    
    const Register = ({ setCurrentView }) => {
        const [fullname, setFullname] = useState(""); const [email, setEmail] = useState(""); const [pwd, setPwd] = useState(""); const [confirmPwd, setConfirmPwd] = useState(""); const [gender, setGender] = useState("Male"); const [showPassword, setShowPassword] = useState(false); const [showConfirmPassword, setShowConfirmPassword] = useState(false); const [loading, setLoading] = useState(false); const [agreeTerms, setAgreeTerms] = useState(false); const [profilePicPreview, setProfilePicPreview] = useState(""); const [profilePicBase64, setProfilePicBase64] = useState("");
        const handleProfilePicChange = async (e) => { const file = e.target.files[0]; if (file) { if (file.size > 2 * 1024 * 1024) { alert("Image too large!"); return; } try { let base64 = await fileToBase64(file); base64 = await compressBase64Image(base64, 150, 150); setProfilePicBase64(base64); setProfilePicPreview(base64); } catch(err) { alert("Error processing image"); } } };
        const handleRegister = async () => { if (!fullname||!email||!pwd||!confirmPwd) { alert("Fill all fields"); return; } if (pwd !== confirmPwd) { alert("Passwords do not match"); return; } if (pwd.length < 6) { alert("Password min 6 characters"); return; } if (!agreeTerms) { alert("Please agree to terms"); return; } setLoading(true); try { const cred = await auth.createUserWithEmailAndPassword(email, pwd); await db.ref(`users/${cred.user.uid}`).set({ fullname, email, gender, profilePic: profilePicBase64 || "", createdAt: Date.now() }); } catch(e) { alert(e.message); } finally { setLoading(false); } };
        return (<div className="min-h-screen flex items-center justify-center p-4"><div className="bg-white p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto"><div className="text-center mb-6"><i className="fas fa-user-graduate text-5xl text-orange-600 mb-3"></i><h2 className="text-2xl md:text-3xl font-bold text-gray-800">Create Account</h2><p className="text-gray-500 text-sm">Join thousands preparing for NPF CBT exam</p></div><div className="flex flex-col items-center mb-4"><div className="relative"><div className="w-24 h-24 rounded-full bg-gray-200 flex items-center justify-center overflow-hidden border-4 border-blue-500 shadow-lg">{profilePicPreview ? (<img src={profilePicPreview} alt="Preview" className="w-full h-full object-cover"/>) : (<i className="fas fa-camera text-3xl text-gray-400"></i>)}</div><label htmlFor="profilePicInput" className="absolute bottom-0 right-0 bg-blue-600 text-white p-2 rounded-full cursor-pointer hover:bg-blue-700 transition"><i className="fas fa-upload text-xs"></i></label><input type="file" id="profilePicInput" accept="image/jpeg,image/png,image/jpg" onChange={handleProfilePicChange} className="hidden"/></div><p className="text-xs text-gray-500 mt-2">Upload profile picture (optional, max 2MB)</p></div><div className="relative mb-4"><i className="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 border rounded-xl" placeholder="Full Name" value={fullname} onChange={e=>setFullname(e.target.value)}/></div><div className="relative mb-4"><i className="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 border rounded-xl" type="email" placeholder="Email Address" value={email} onChange={e=>setEmail(e.target.value)}/></div><div className="relative mb-4"><i className="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 pr-12 border rounded-xl" type={showPassword?"text":"password"} placeholder="Password (min. 6 characters)" value={pwd} onChange={e=>setPwd(e.target.value)}/><i className={`fa-solid ${showPassword?"fa-eye-slash":"fa-eye"} absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400`} onClick={()=>setShowPassword(!showPassword)}></i></div><div className="relative mb-4"><i className="fas fa-check-circle absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input className="w-full p-3 pl-10 pr-12 border rounded-xl" type={showConfirmPassword?"text":"password"} placeholder="Confirm Password" value={confirmPwd} onChange={e=>setConfirmPwd(e.target.value)}/><i className={`fa-solid ${showConfirmPassword?"fa-eye-slash":"fa-eye"} absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400`} onClick={()=>setShowConfirmPassword(!showConfirmPassword)}></i></div><div className="relative mb-4"><i className="fas fa-venus-mars absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 z-10"></i><select className="w-full p-3 pl-10 border rounded-xl appearance-none bg-white" value={gender} onChange={e=>setGender(e.target.value)}><option>Male</option><option>Female</option><option>Other</option></select><i className="fas fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i></div><div className="flex items-center gap-2 mb-6"><input type="checkbox" id="terms" checked={agreeTerms} onChange={e=>setAgreeTerms(e.target.checked)} className="w-4 h-4"/><label htmlFor="terms" className="text-sm text-gray-600">I agree to the <a href="#" className="text-orange-600">Terms</a> and <a href="#" className="text-orange-600">Privacy</a></label></div><button onClick={handleRegister} disabled={loading} className="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 disabled:opacity-50">{loading?<><i className="fas fa-spinner fa-spin"></i><span>Creating...</span></>:<><i className="fas fa-user-plus"></i><span>Create Account</span></>}</button><div className="flex items-center my-6"><div className="flex-1 border-t border-gray-300"></div><span className="px-4 text-gray-500 text-sm">or</span><div className="flex-1 border-t border-gray-300"></div></div><p className="text-center text-gray-600">Already have an account? <button onClick={()=>setCurrentView("login")} className="text-orange-600 font-semibold"><i className="fas fa-sign-in-alt mr-1"></i>Login here</button></p><button onClick={()=>setCurrentView("landing")} className="mt-4 text-gray-500 underline flex items-center justify-center gap-1 w-full"><i className="fas fa-arrow-left"></i><span>Back to Home</span></button></div></div>);
    };
    
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('Service Worker registered successfully:', registration.scope);
                })
                .catch(error => {
                    console.log('Service Worker registration failed:', error);
                });
        });
    }
</script>
</body>
</html>
