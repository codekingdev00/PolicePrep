<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline - CBT App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .box {
      max-width: 500px;
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #60a5fa;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #cbd5e1;
    }

    .icon {
      font-size: 50px;
      margin-bottom: 10px;
    }

    button {
      margin-top: 20px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="icon">📴</div>
    <h1>You are Offline</h1>
    <p>
      Your internet connection is currently unavailable.  
      Please check your network and try again.
    </p>
    <p>
      This CBT application requires internet to load new questions and sync results.
    </p>

    <button onclick="location.reload()">Retry</button>
  </div>

</body>
</html>
